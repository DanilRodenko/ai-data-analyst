<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Data Analyst</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>AI Data Analyst</h1>
          <p>Upload. Ask. Understand.</p>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Dataset</div>
        <div class="dropzone" id="dropzone">
          <strong>Drop CSV here</strong>
          <span id="dropHint">or click to browse</span>
          <input type="file" id="fileInput" accept=".csv" hidden />
        </div>
        <button class="btn btn-secondary" id="summarizeBtn">Analyze Dataset</button>
      </div>

      <div class="section-label" style="padding: 0 18px;">Chat history</div>
      <div class="chat" id="chat">
        <div class="chat-empty" id="chatEmpty">No messages yet.</div>
      </div>

      <div class="composer">
        <textarea id="queryInput" rows="3"
          placeholder="Ask a question about your data…"></textarea>
        <button class="btn" id="analyzeBtn">Send</button>
      </div>
    </aside>

    <!-- Main panel -->
    <main class="main">
      <div class="main-header">
        <h2>Analysis</h2>
        <p id="subtitle">Upload a CSV and ask a question to get started.</p>
      </div>

      <div id="results">
        <div class="empty-state" id="emptyState">
          <div>
            <div class="big">📊</div>
            <div>Your insights and charts will appear here.</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
